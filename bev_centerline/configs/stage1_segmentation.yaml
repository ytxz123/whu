project_root: ..
paths:
  qwen_path: ../qwen3.5_2B
  dinov3_repo: ../dinov3
  output_dir: outputs/stage1

seed: 42
device: auto

data:
  train_manifest: data/stage1/train.jsonl
  val_manifest: data/stage1/val.jsonl
  image_size: 512
  batch_size: 2
  num_workers: 2

model:
  dinov3_arch: dinov3_vits16
  dinov3_weights: null
  dinov3_pretrained: false
  freeze_backbone: false
  trainable_last_blocks: 2
  feature_dim: 384

optim:
  epochs: 5
  lr: 0.0001
  weight_decay: 0.01
  log_every: 20

